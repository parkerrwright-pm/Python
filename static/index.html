<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Calculator</h1>
            </div>
            
            <div class="display">
                <input type="text" id="expression" class="expression-input" placeholder="Enter expression" readonly>
                <input type="text" id="result" class="result-display" placeholder="0" readonly>
            </div>
            
            <div class="button-grid">
                <button class="btn function-btn" onclick="clearDisplay()">C</button>
                <button class="btn function-btn" onclick="deleteLast()">←</button>
                <button class="btn function-btn" onclick="appendOperator('%')">%</button>
                <button class="btn operator-btn" onclick="appendOperator('/')">÷</button>
                
                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator-btn" onclick="appendOperator('*')">×</button>
                
                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn operator-btn" onclick="appendOperator('-')">−</button>
                
                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn operator-btn" onclick="appendOperator('+')">+</button>
                
                <button class="btn" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn" onclick="appendOperator('**')">^</button>
                <button class="btn equals-btn" onclick="calculate()">=</button>
            </div>
            
            <div class="info">
                <p id="status">Ready</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid min-vh-100">
        <!-- Header -->
        <div class="header">
            <div class="container py-5">
                <h1 class="text-white mb-4">Weather Forecast</h1>
                
                <!-- Search Form -->
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="search-box">
                            <form id="searchForm" class="d-flex gap-2">
                                <input 
                                    type="text" 
                                    id="cityInput" 
                                    class="form-control form-control-lg" 
                                    placeholder="Enter city name (e.g., London, New York, Tokyo)"
                                    required
                                >
                                <button type="submit" class="btn btn-primary btn-lg px-4">
                                    <span id="searchBtnText">Search</span>
                                    <span id="searchSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                                </button>
                            </form>
                            <div id="errorMessage" class="alert alert-danger mt-2 d-none" role="alert"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="container py-5">
            <!-- Current Weather Section -->
            <div id="weatherContainer" class="d-none">
                <div class="row mb-5">
                    <div class="col-12">
                        <div class="card current-weather-card shadow-lg">
                            <div class="card-body">
                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <h2 id="cityName" class="card-title mb-1"></h2>
                                        <p id="weatherDescription" class="text-muted mb-4 fs-5"></p>
                                        <div class="temperature-display">
                                            <span id="temperature" class="display-1 fw-bold"></span>
                                        </div>
                                        <p id="feelsLike" class="text-muted mt-2">Feels like <span id="feelsLikeTemp"></span></p>
                                    </div>
                                    <div class="col-md-6 text-center">
                                        <div id="weatherIcon" class="weather-emoji-large"></div>
                                    </div>
                                </div>
                                
                                <!-- Additional Weather Details -->
                                <div class="row mt-4 pt-4 border-top">
                                    <div class="col-md-3 text-center mb-3">
                                        <div class="weather-detail">
                                            <p class="text-muted small mb-1">Humidity</p>
                                            <p class="fs-5 fw-bold"><i class="bi bi-droplet-fill"></i> <span id="humidity"></span>%</p>
                                        </div>
                                    </div>
                                    <div class="col-md-3 text-center mb-3">
                                        <div class="weather-detail">
                                            <p class="text-muted small mb-1">Wind Speed</p>
                                            <p class="fs-5 fw-bold"><i class="bi bi-wind"></i> <span id="windSpeed"></span> m/s</p>
                                        </div>
                                    </div>
                                    <div class="col-md-3 text-center mb-3">
                                        <div class="weather-detail">
                                            <p class="text-muted small mb-1">Pressure</p>
                                            <p class="fs-5 fw-bold"><i class="bi bi-speedometer"></i> <span id="pressure"></span> hPa</p>
                                        </div>
                                    </div>
                                    <div class="col-md-3 text-center mb-3">
                                        <div class="weather-detail">
                                            <p class="text-muted small mb-1">Cloudiness</p>
                                            <p class="fs-5 fw-bold"><i class="bi bi-cloud"></i> <span id="cloudiness"></span>%</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 5-Day Forecast Section -->
                <div class="row">
                    <div class="col-12">
                        <h3 class="mb-4">5-Day Forecast</h3>
                        <div id="forecastContainer" class="row g-3"></div>
                    </div>
                </div>
            </div>

            <!-- Welcome Message -->
            <div id="welcomeMessage" class="text-center py-5">
                <p class="fs-5 text-muted">Enter a city name above to see the current weather and 5-day forecast.</p>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
